<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amarena Pictures — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --off-black: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --border-light: #333;
    --text: #e8e8e8;
    --text-muted: #777;
    --t1: #E8151B; --t2: #f0b429; --t3: #3ecf8e; --t4: #4a9eff; --t5: #888888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 300; min-height: 100vh; }

  /* ── HEADER ── */
  header { background: var(--off-black); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: stretch; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 12px; padding-right: 28px; border-right: 1px solid var(--border); }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; }
  .logo-text span { color: var(--t1); }
  .header-stats { display: flex; align-items: center; gap: 0; margin-left: 20px; flex: 1; }
  .hstat { padding: 0 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; height: 100%; }
  .hstat-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; line-height: 1; }
  .hstat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 2px; }
  .hstat-num.t1 { color: var(--t1); } .hstat-num.t2 { color: var(--t2); } .hstat-num.t3 { color: var(--t3); } .hstat-num.t4 { color: var(--t4); } .hstat-num.t5 { color: var(--t5); }
  .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; overflow-y: auto; padding: 0 28px 70px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: var(--text-muted); border-bottom: 1px solid var(--border); cursor: pointer; }
  tbody tr { border-bottom: 1px solid var(--border); }
  td { padding: 9px 12px; }
  .td-name { font-weight: 500; white-space: nowrap; }
  .td-notes { color: #ffffff !important; font-size: 11px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-date.t1 { color: var(--t1); } .td-date.t2 { color: var(--t2); } .td-date.t3 { color: var(--t3); } .td-date.t4 { color: var(--t4); } .td-date.t5 { color: var(--text-muted); }

  /* ── BADGES & ACTIONS ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 2px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 10px; text-transform: uppercase; }
  .bdg-t1 { background: rgba(232,21,27,0.15); color: var(--t1); } .bdg-t2 { background: rgba(240,180,41,0.15); color: var(--t2); } .bdg-t3 { background: rgba(62,207,142,0.15); color: var(--t3); } .bdg-t4 { background: rgba(74,158,255,0.15); color: var(--t4); } .bdg-t5 { background: rgba(136,136,136,0.15); color: var(--t5); }
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  tbody tr:hover .row-actions, tbody tr:focus-within .row-actions { opacity: 1; }
  .act-btn { padding: 3px 8px; border: 1px solid var(--border-light); border-radius: 3px; background: transparent; color: var(--text-muted); cursor: pointer; }
  .act-btn:hover { background: var(--card); border-color: var(--text-muted); }
  .btn { padding: 7px 16px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 12px; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); }
  .btn-t1 { background: var(--t1); border: none; color: white; }
</style>
</head>
<body>

</body>
</html>
