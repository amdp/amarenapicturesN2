<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amarena Pictures — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --off-black: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --border-light: #333;
    --text: #e8e8e8;
    --text-muted: #777;
    --text-dim: #555;
    
    /* ── UNIFIED COLOR PALETTE ── */
    --t1: #E8151B; /* Red */
    --t2: #f0b429; /* Yellow */
    --t3: #3ecf8e; /* Green */
    --t4: #4a9eff; /* Blue */
    --t5: #888888; /* Grey */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--off-black);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: stretch;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; padding-right: 28px; border-right: 1px solid var(--border); }
  .logo-wave { width: 32px; height: 18px; }
  .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; }
  .logo-text span { color: var(--t1); }
  
  .header-stats { display: flex; align-items: center; gap: 0; margin-left: 20px; flex: 1; }
  .hstat { padding: 0 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; height: 100%; }
  .hstat-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 20px; line-height: 1; }
  .hstat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 2px; }
  
  .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* ── TOOLBAR ── */
  .toolbar { padding: 12px 28px; background: var(--off-black); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; position: sticky; top: 56px; z-index: 90; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  input[type=text], select { background: var(--card); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 300; padding: 7px 10px; outline: none; transition: border-color 0.15s; }
  input[type=text]:focus, select:focus { border-color: var(--t1); }
  .search-wrap input { width: 100%; padding-left: 32px; }
  select { cursor: pointer; }
  select option { background: var(--card); }

  .btn { padding: 7px 16px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--t1); color: var(--t1); }
  .btn-t1 { background: var(--t1); border-color: var(--t1); color: #fff; }
  .btn-t2 { background: transparent; border-color: var(--t2); color: var(--t2); }
  .btn-t2:hover, .btn-t2.active { background: var(--t2); color: var(--black); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; overflow-y: auto; padding: 0 28px 70px; }
  table { width: 100%; border-collapse: collapse; }
  thead { position: sticky; top: 0; z-index: 10; background: var(--black); }
  th { text-align: left; padding: 10px 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sort-active { color: var(--t1); }
  th.sort-active .sort-arrow { opacity: 1; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody tr.t1 { border-left: 2px solid var(--t1); }
  tbody tr.t2 { border-left: 2px solid var(--t2); }
  tbody tr.t3 { border-left: 2px solid var(--t3); }
  tbody tr.t4 { border-left: 2px solid var(--t4); }

  td { padding: 9px 12px; vertical-align: middle; }
  .td-name { font-weight: 500; font-size: 13px; white-space: nowrap; min-width: 160px; }
  .td-sector { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .td-notes { color: white; font-size: 11px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-date { white-space: nowrap; font-size: 12px; font-variant-numeric: tabular-nums; }
  .td-date.t1 { color: var(--t1); }
  .td-date.t2 { color: var(--t2); }
  .td-date.t3 { color: var(--t3); }
  .td-date.t4 { color: var(--t4); }
  .td-date.t5 { color: var(--text-muted); }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 2px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  
  .bdg-t1 { background: rgba(232,21,27,0.15); color: var(--t1); } .bdg-t1 .badge-dot { background: var(--t1); }
  .bdg-t2 { background: rgba(240,180,41,0.15); color: var(--t2); } .bdg-t2 .badge-dot { background: var(--t2); }
  .bdg-t3 { background: rgba(62,207,142,0.15); color: var(--t3); } .bdg-t3 .badge-dot { background: var(--t3); }
  .bdg-t4 { background: rgba(74,158,255,0.15); color: var(--t4); } .bdg-t4 .badge-dot { background: var(--t4); }
  .bdg-t5 { background: rgba(136,136,136,0.15); color: var(--t5); } .bdg-t5 .badge-dot { background: var(--t5); }

  /* ── ACTIONS ── */
  .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  tbody tr:hover .row-actions, tbody tr:focus-within .row-actions { opacity: 1; }
  .act-btn { padding: 3px 8px; border: 1px solid var(--border-light); border-radius: 3px; background: transparent; color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .act-btn:hover { background: var(--card); color: var(--text); border-color: var(--text-muted); }
  .act-t1 { border-color: var(--t1); color: var(--t1); } .act-t1:hover { background: var(--t1); color: var(--black); }
  .act-t2 { border-color: var(--t2); color: var(--t2); } .act-t2:hover { background: var(--t2); color: var(--black); }
  .act-t3 { border-color: var(--t3); color: var(--t3); } .act-t3:hover { background: var(--t3); color: var(--black); }
  .act-t4 { border-color: var(--t4); color: var(--t4); } .act-t4:hover { background: var(--t4); color: var(--black); }
  .act-t5 { border-color: var(--t5); color: var(--t5); } .act-t5:hover { background: var(--t5); color: var(--black); }

  .act-input { width: 32px; padding: 3px 0; border: 1px solid var(--border-light); border-radius: 3px; background: transparent; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; text-align: center; outline: none; }
  
  /* ── MODAL ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--off-black); border: 1px solid var(--border); border-radius: 6px; padding: 28px; width: 480px; max-width: 95vw; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--black); border: 1px solid var(--border-light); border-radius: 4px; color: var(--text); padding: 8px 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .edit-select { background: var(--black); border: 1px solid var(--border-light); border-radius: 3px; color: var(--text); padding: 4px 7px; }

  /* ── OTHER ── */
  .pager { position: fixed; bottom: 0; left: 0; right: 0; background: var(--off-black); border-top: 1px solid var(--border); padding: 10px 28px; display: flex; align-items: center; gap: 6px; z-index: 50; }
  .pager-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 3px; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .pager-btn.active { background: var(--t1); border-color: var(--t1); color: #fff; }
  .toast { position: fixed; bottom: 60px; right: 28px; background: var(--card); border: 1px solid var(--border-light); border-left: 3px solid var(--t3); border-radius: 4px; padding: 10px 16px; opacity: 0; transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-wave" viewBox="0 0 120 40" fill="none">
      <path d="M0 28 C20 28 20 8 40 8 C60 8 60 28 80 28 C100 28 100 8 120 8" stroke="#E8151B" stroke-width="5" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="logo-text"><span>Amarena</span> Pictures</div>
  </div>
  <div class="header-stats" id="headerStats"></div>
  <div class="header-actions">
    <button class="btn btn-t2" id="btnDue" onclick="toggleDue()">⚑ Due</button>
    <button class="btn" onclick="exportCSV()">↓ CSV</button>
    <button class="btn btn-t1" onclick="openAddModal()">+ Add</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search…" oninput="onFilter()">
  </div>
  <select id="filterType" onchange="onFilter()">
    <option value="">All types</option>
    <option value="Client">Client</option>
    <option value="Agency">Agency</option>
    <option value="Other">Other</option>
  </select>
  <select id="filterStatus" onchange="onFilter()">
    <option value="">All statuses</option>
    <option value="pending">Pending</option>
    <option value="contacted">Contacted</option>
    <option value="replied">Replied</option>
    <option value="pass">Pass</option>
  </select>
  <select id="sortCol" onchange="onFilter()">
    <option value="next_contact">Sort: Date</option>
    <option value="type">Sort: Type</option>
    <option value="name">Sort: Name</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="setSort('name')">Brand</th>
        <th onclick="setSort('owner')">Owner</th>
        <th onclick="setSort('type')">Type</th>
        <th>Sector</th>
        <th>Status</th>
        <th onclick="setSort('next_contact')">Next Contact</th>
        <th>Notes</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="pager" id="pager"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Add/Edit</h3>
    <div class="form-row"><label>Brand</label><input type="text" id="f-name"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-row"><label>Type</label>
            <select id="f-type"><option value="Client">Client</option><option value="Agency">Agency</option><option value="Other">Other</option></select>
        </div>
        <div class="form-row"><label>Status</label>
            <select id="f-status"><option value="pending">Pending</option><option value="contacted">Contacted</option><option value="replied">Replied</option><option value="pass">Pass</option></select>
        </div>
    </div>
    <div class="form-row"><label>Owner</label>
        <select id="f-owner"><option value="">—</option><option value="Gio">Gio</option><option value="Ale">Ale</option><option value="Other">Other</option></select>
    </div>
    <div class="form-row"><label>Next contact</label><input type="date" id="f-date"></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-t1" onclick="saveModal()">Save</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = [], filtered = [], sortCol = 'next_contact', sortAsc = true, page = 1, perPage = 'all', dueOnly = false, editId = null;

async function syncRow(row, oldName = null) {
  const payload = { ...row, old: oldName !== null, oldname: oldName };
  const res = await fetch('https://amarenapictures.com/api/crm', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  return (await res.text()) !== 'exists';
}

function today() { return new Date().toISOString().slice(0,10); }
function addDays(d, n) { const dt = new Date(d || today()); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0,10); }

function render() {
  filtered = data.filter(r => {
    const q = document.getElementById('search').value.toLowerCase();
    if (q && !r.name.toLowerCase().includes(q)) return false;
    const ft = document.getElementById('filterType').value;
    if (ft && r.type !== ft) return false;
    const fs = document.getElementById('filterStatus').value;
    if (fs && r.status !== fs) return false;
    return true;
  }).sort((a,b) => (a[sortCol] < b[sortCol] ? -1 : 1) * (sortAsc ? 1 : -1));

  renderStats();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(r => `
    <tr class="${dateClass(r.next_contact)}">
      <td>${esc(r.name)}</td>
      <td>${ownerLabel(r.owner, r._id)}</td>
      <td>${typeBadge(r.type, r._id)}</td>
      <td>${esc(r.sector)}</td>
      <td>${statusBadge(r.status)}</td>
      <td class="td-date ${dateClass(r.next_contact)}">${r.next_contact}</td>
      <td class="td-notes">${esc(r.notes)}</td>
      <td>
        <div class="row-actions">
          <button class="act-btn act-t4" onclick="snooze(${r._id}, 1)">+1</button>
          <button class="act-btn act-t2" onclick="snooze(${r._id}, 3)">+3</button>
          <button class="act-btn act-t3" onclick="snooze(${r._id}, 7)">+7</button>
          <button class="act-btn act-t1" onclick="openEditModal(${r._id})">Edit</button>
        </div>
      </td>
    </tr>`).join('');
}

function dateClass(d) {
    const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
    if (isNaN(diff)) return 't5';
    if (diff < 0) return 't1';
    if (diff === 0) return 't2';
    if (diff === 1) return 't3';
    return 't4';
}

function statusBadge(s) {
  const colors = { 'pending':'t2', 'contacted':'t4', 'replied':'t3', 'pass':'t5' };
  return `<span class="badge bdg-${colors[s] || 't5'}">${s}</span>`;
}

function typeBadge(t, id) {
  const c = { 'Client':'t2', 'Agency':'t4', 'Other':'t3' }[t] || 't5';
  return `<span class="badge bdg-${c}" style="cursor:pointer" onclick="inlineEdit(event, ${id}, 'type')"><span class="badge-dot"></span>${t || 'Other'}</span>`;
}

function ownerLabel(o, id) {
  const c = { 'Ale':'t2', 'Gio':'t4', 'Other':'t3' }[o] || 't5';
  return `<span class="badge bdg-${c}" style="cursor:pointer" onclick="inlineEdit(event, ${id}, 'owner')"><span class="badge-dot"></span>${o || '—'}</span>`;
}

function inlineEdit(e, id, field) {
    const td = e.currentTarget.closest('td');
    const r = data.find(d => d._id === id);
    const options = field === 'type' ? ['Client','Agency','Other'] : ['Gio','Ale','Other'];
    td.innerHTML = `<select class="edit-select" onchange="saveInline(${id}, '${field}', this.value)" onblur="render()">${options.map(o => `<option value="${o}" ${r[field]===o?'selected':''}>${o}</option>`).join('')}</select>`;
    td.querySelector('select').focus();
}

async function saveInline(id, field, val) {
    const r = data.find(d => d._id === id);
    r[field] = val;
    await syncRow(r, r.name);
    render();
}

function renderStats() {
    document.getElementById('headerStats').innerHTML = `
        <div class="hstat"><div class="hstat-num">${data.length}</div><div class="hstat-label">Brands</div></div>
        <div class="hstat"><div class="hstat-num t2">${data.filter(r=>r.type==='Client').length}</div><div class="hstat-label">Client</div></div>
        <div class="hstat"><div class="hstat-num t4">${data.filter(r=>r.type==='Agency').length}</div><div class="hstat-label">Agency</div></div>
        <div class="hstat"><div class="hstat-num t3">${data.filter(r=>r.type==='Other').length}</div><div class="hstat-label">Other</div></div>`;
}

async function snooze(id, days) {
    const r = data.find(d => d._id === id);
    r.next_contact = addDays(r.next_contact, days);
    await syncRow(r, r.name);
    render();
}

function openAddModal() { editId = null; document.getElementById('modalBg').classList.add('open'); }
function openEditModal(id) { editId = id; const r = data.find(d=>d._id===id); document.getElementById('f-name').value=r.name; document.getElementById('modalBg').classList.add('open'); }
function closeModal(e) { if (!e || e.target.id === 'modalBg') document.getElementById('modalBg').classList.remove('open'); }
async function saveModal() {
    const r = editId ? data.find(d=>d._id===editId) : {};
    r.name = document.getElementById('f-name').value;
    r.type = document.getElementById('f-type').value;
    r.status = document.getElementById('f-status').value;
    r.owner = document.getElementById('f-owner').value;
    r.next_contact = document.getElementById('f-date').value;
    r.notes = document.getElementById('f-notes').value;
    await syncRow(r, editId ? r.name : null);
    closeModal(); render();
}
function esc(s) { return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function setSort(col) { sortCol = col; sortAsc = !sortAsc; render(); }
function setPerPage(v) { perPage = v; render(); }
</script>
</body>
</html>
